name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.22.0"
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn format
      - run: yarn build
      - run: yarn test
