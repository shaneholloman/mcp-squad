name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn format
      - run: yarn codegen:check
      - run: yarn build
      - run: yarn test
